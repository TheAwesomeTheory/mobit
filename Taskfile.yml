version: "3"

tasks:
  build:
    desc: Build assembly STEP + GLB with routed wires
    cmd: uv run python scripts/build.py

  validate:
    desc: Validate pin positions with colored spheres
    cmd: uv run python scripts/validate.py

  optimize:
    desc: Find optimal board rotation to minimize wire length
    cmd: uv run python scripts/optimize.py

  distance:
    desc: Measure distance between two pins (e.g., task distance -- xiao D4 bno085 SDA)
    cmd: uv run python scripts/distance.py {{.CLI_ARGS}}

  render:
    desc: Render assembly PNGs
    cmd: uv run python scripts/render.py

  view:
    desc: Open assembly in 3dviewer.net
    cmds:
      - |
        PORT=8317
        kill $(lsof -ti:$PORT) 2>/dev/null || true
        sleep 0.3
        cd cad && uv run python -m mobit.serve $PORT &
        sleep 0.5
        open "https://3dviewer.net/#model=http://localhost:$PORT/dadovida.glb"

  view:step:
    desc: Open STEP assembly in 3dviewer.net
    cmds:
      - |
        PORT=8317
        kill $(lsof -ti:$PORT) 2>/dev/null || true
        sleep 0.3
        cd cad && uv run python -m mobit.serve $PORT &
        sleep 0.5
        open "https://3dviewer.net/#model=http://localhost:$PORT/dadovida_routed.step"
